<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .profile-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header-bg {
            background: var(--primary-gradient);
            height: 180px;
            position: relative;
            overflow: hidden;
        }
        
        .header-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .avatar-container {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            border: 6px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 700;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .verified-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--success-gradient);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            font-size: 1rem;
        }
        
        .info {
            padding: 80px 40px 40px;
            text-align: center;
        }
        
        .badge-share {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #e6fffa 0%, #c6f6d5 100%);
            color: #11998e;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.2);
        }
        
        .user-name {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        .user-email {
            color: #718096;
            font-size: 1rem;
            margin-bottom: 30px;
            word-break: break-all;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #718096;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn-custom {
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary-custom {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }
        
        .btn-secondary-custom {
            background: white;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }
        
        .btn-secondary-custom:hover {
            background: #f8f9fa;
            border-color: #cbd5e0;
            transform: translateY(-3px);
        }
        
        .share-code {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 15px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #667eea;
            margin-top: 20px;
            word-break: break-all;
            border: 2px dashed #cbd5e0;
        }
        
        .error-state {
            text-align: center;
            padding: 60px 40px;
        }
        
        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .error-state h2 {
            color: #e74c3c;
            margin-bottom: 15px;
        }
        
        .error-state p {
            color: #718096;
            margin-bottom: 25px;
        }
        
        @media (max-width: 768px) {
            .profile-card { margin: 10px; }
            .header-bg { height: 150px; }
            .avatar { width: 100px; height: 100px; font-size: 2.5rem; }
            .info { padding: 70px 25px 30px; }
            .user-name { font-size: 1.5rem; }
            .stats-row { grid-template-columns: 1fr; }
            .actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="profile-card" id="profileCard">
        <!-- Content will be injected by JavaScript -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const path = window.location.pathname;
            const parts = path.split('/').filter(p => p);
            
            console.log('🔍 Path:', path);
            console.log('📦 Parts:', parts);
            
            // ពិនិត្យថាតើជា /share/username/code ឬអត់
            if (parts[0] === 'share' && parts.length >= 3) {
                const username = decodeURIComponent(parts[1]);
                const code = parts[2];
                
                console.log('👤 Searching for user:', { username, code });
                
                // ស្វែងរក User ក្នុង LocalStorage
                const users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
                console.log('💾 Total users:', users.length);
                
                const targetUser = users.find(u => {
                    const userNameSlug = (u.name || '').toLowerCase().replace(/\s+/g, '-');
                    const userEmailSlug = (u.email || '').split('@')[0].toLowerCase();
                    const matchName = userNameSlug === username.toLowerCase();
                    const matchEmail = userEmailSlug === username.toLowerCase();
                    
                    console.log(`✓ Checking: ${u.name}`, { matchName, matchEmail });
                    return matchName || matchEmail;
                });
                
                if (targetUser) {
                    console.log('✅ User found:', targetUser);
                    renderProfile(targetUser, code);
                } else {
                    console.log('❌ User NOT found');
                    renderError(username, code);
                }
            } else {
                console.log('⚠️ Invalid URL');
                renderError('', '');
            }
        });
        
        function renderProfile(user, code) {
            const avatar = (user.name || 'U').charAt(0).toUpperCase();
            const name = user.name || 'User';
            const email = user.email || '';
            
            document.getElementById('profileCard').innerHTML = `
                <div class="header-bg">
                    <div class="avatar-container">
                        <div class="avatar">${avatar}</div>
                        <div class="verified-badge"><i class="bi bi-check-lg"></i></div>
                    </div>
                </div>
                <div class="info">
                    <div class="badge-share"><i class="bi bi-share-fill"></i> Shared Profile</div>
                    <h1 class="user-name">${name}</h1>
                    <p class="user-email">${email}</p>
                    
                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="stat-value">👤</div>
                            <div class="stat-label">Member</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">🛍️</div>
                            <div class="stat-label">Shopper</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">⭐</div>
                            <div class="stat-label">Verified</div>
                        </div>
                    </div>
                    
                    <div class="actions">
                        <a href="../../index.html" class="btn-custom btn-primary-custom">
                            <i class="bi bi-shop"></i> Visit Shop
                        </a>
                        <button onclick="window.history.back()" class="btn-custom btn-secondary-custom">
                            <i class="bi bi-arrow-left"></i> Go Back
                        </button>
                    </div>
                    
                    <div class="share-code">
                        <i class="bi bi-link-45deg"></i> Share Code: ${code}
                    </div>
                </div>
            `;
            
            document.title = `${name} - AHNAJAK CODE`;
        }
        
        function renderError(username, code) {
            document.getElementById('profileCard').innerHTML = `
                <div class="error-state">
                    <div class="error-icon">😕</div>
                    <h2>រកមិនើញគណនី</h2>
                    <p>គណនី "<strong>${username || 'Unknown'}</strong>" មិនមានក្នុងប្រព័ន្ធ ឬ Link នេះអត់សុពលភាព។</p>
                    ${code ? `<div class="share-code" style="margin-bottom:20px;"><i class="bi bi-link-45deg"></i> Code: ${code}</div>` : ''}
                    <a href="../.." class="btn-custom btn-primary-custom" style="display:inline-flex;">
                        <i class="bi bi-house"></i> ត្រឡប់ទៅទំព័រដើម
                    </a>
                </div>
            `;
            
            document.title = 'Profile Not Found - AHNAJAK CODE';
        }
    </script>
</body>
</html>
