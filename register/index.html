<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@300;400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        :root { 
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body { 
            font-family: 'Poppins', 'Hanuman', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 30%, #B0E0E6 60%, #87CEEB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .auth-title {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        
        .auth-title h2 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .btn-auth {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #718096;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .divider span {
            padding: 0 15px;
            font-size: 0.9rem;
        }
        
        .auth-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-title">
            <img src="https://i.ibb.co/S4vrvBq8/logo-website.png" alt="Logo" style="height: 60px; margin-bottom: 15px;">
            <h2>Create Account</h2>
            <p class="text-muted">Join AHNAJAK CODE today</p>
        </div>

        <!-- Google Sign-Up Button -->
        <div id="g_id_onload"
             data-client_id="166296204052-ba45pf8lu1tsdfv5590oreeg3daae0s5.apps.googleusercontent.com"
             data-context="signup"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-logo_alignment="left"
             data-width="380">
        </div>

        <div class="divider">
            <span>OR REGISTER WITH EMAIL</span>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label fw-bold"><i class="bi bi-person"></i> Full Name</label>
                <input type="text" id="regName" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold"><i class="bi bi-lock"></i> Password</label>
                <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="bi bi-person-plus"></i> Register
            </button>
        </form>

        <div class="auth-link">
            Already have an account? <a href="../login">Login here</a>
        </div>
    </div>

    <script>
        // Handle Google Sign-Up response
        function handleCredentialResponse(response) {
            // Decode JWT token
            const responsePayload = decodeJwtResponse(response.credential);

            console.log("ID: " + responsePayload.sub);
            console.log('Full Name: ' + responsePayload.name);
            console.log('Email: ' + responsePayload.email);
            console.log("Image URL: " + responsePayload.picture);

            // Create user object
            const googleUser = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture,
                isGoogleUser: true
            };

            // Check if user already exists
            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const existingUser = users.find(u => u.email === googleUser.email);
            
            if (existingUser) {
                showAlert('This email is already registered. Please login instead.', 'error');
                setTimeout(() => {
                    window.location.href = '../login/login.html';
                }, 2000);
                return;
            }

            // Add new user to database (localStorage)
            users.push(googleUser);
            localStorage.setItem('ahnajak_users', JSON.stringify(users));
            
            // Set current session
            localStorage.setItem('current_user', JSON.stringify(googleUser));
            
            showAlert(`Welcome to AHNAJAK CODE, ${responsePayload.name}!`, 'success');
            setTimeout(() => {
                window.location.href = '../..';
            }, 1500);
        }

        // Decode JWT
        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // Regular email/password registration
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // Check if email already exists
            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const userExists = users.find(u => u.email === email);

            if (userExists) {
                showAlert('This email is already registered. Please login instead.', 'error');
                return;
            }

            // Create new user
            const newUser = { name, email, password };
            users.push(newUser);
            localStorage.setItem('ahnajak_users', JSON.stringify(users));

            showAlert('Registration successful! Redirecting to login...', 'success');
            setTimeout(() => {
                window.location.href = '../login';
            }, 1500);
        });

        // Show alert function
        function showAlert(msg, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type === 'success' ? 'success' : 'danger'} alert-dismissible fade show`;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.minWidth = '300px';
            alertDiv.innerHTML = `
                ${msg}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 4000);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
