<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AnajakCode</title>
    
    <!-- Logo & Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/gZ6m58FJ/web-search-2.png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: none;
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }
        
        .card-header-custom {
            background: transparent;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 30px 30px 10px;
            text-align: center;
        }
        
        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        .form-floating > label {
            color: #6c757d;
        }
        
        .btn-telegram-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #6c757d;
            font-size: 0.85rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .btn-register {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .btn-register:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
        
        .login-link {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="card-header-custom">
            <img src="https://i.ibb.co/gZ6m58FJ/web-search-2.png" alt="AnajakCode Logo" class="logo-img">
            <h4 class="fw-bold mb-1">Create Account</h4>
            <p class="text-muted small mb-0">Join ANAJAK CODE today</p>
        </div>
        
        <div class="card-body p-4 pt-2">
            <!-- Telegram Login Section -->
            <div class="btn-telegram-wrapper">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-login="Ahnajakcode_Bot" 
                        data-size="large" 
                        data-radius="50" 
                        data-onauth="onTelegramAuth" 
                        data-request-access="write">
                </script>
            </div>
            
            <div class="divider">
                <span>OR REGISTER WITH EMAIL</span>
            </div>
            
            <!-- Email Registration Form -->
            <form id="registerForm" action="#" method="POST">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control rounded-3" id="fullName" placeholder="Full Name" required>
                    <label for="fullName"><i class="fas fa-user me-2"></i>Full Name</label>
                </div>
                
                <div class="form-floating mb-3">
                    <input type="email" class="form-control rounded-3" id="email" placeholder="Email Address" required>
                    <label for="email"><i class="fas fa-envelope me-2"></i>Email Address</label>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="password" class="form-control rounded-3" id="password" placeholder="Password" required>
                    <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 rounded-3 btn-register mb-3">
                    <i class="fas fa-user-plus me-2"></i>Register
                </button>
            </form>
            
            <div class="text-center mt-3">
                <p class="mb-0 text-muted small">Already have an account? 
                    <a href="../login" class="login-link">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Telegram Auth Handler & Notification Script -->
    <script>
        // ️ ចំណាំ: អ្នកត្រូវដាក់ BOT_TOKEN របស់អ្នកនៅទីនេះ
        // វិធីរក Token: ចូល @BotFather > /mybots > ជរើស Bot > API Token
        const BOT_TOKEN = '8877583046:AAF8wWMSetF3SGjV2DLtpJOGvPijuk01uBs'; 
        
        // ID របស់អ្នក (Admin) ដែលចង់ទទួលសារជូនដំណឹង
        // វិធីរក ID: ផ្ញើសារទៅ Bot @userinfobot ក្នុង Telegram
        const ADMIN_CHAT_ID = 'YOUR_ADMIN_CHAT_ID_HERE'; 

        function onTelegramAuth(user) {
            // 1. បងហាញសារជោគជ័យ
            console.log('Telegram User:', user);
            
            // 2. ផ្ញើសារ "New login" ទៅកាន់ Bot
            if (BOT_TOKEN !== 'YOUR_BOT_TOKEN_HERE' && ADMIN_CHAT_ID !== 'YOUR_ADMIN_CHAT_ID_HERE') {
                const message = `🔔 *New Login Detected!*\n\n` +
                                `👤 *Name:* ${user.first_name} ${user.last_name || ''}\n` +
                                `🆔 *ID:* \`${user.id}\`\n` +
                                ` *Username:* @${user.username || 'N/A'}\n` +
                                ` *Time:* ${new Date().toLocaleString()}`;
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.ok) {
                        alert('✅ Login Successful! Notification sent to admin.');
                        // Redirect ទៅទំព័រ Dashboard ឬ Home
                        // window.location.href = '/dashboard'; 
                    } else {
                        alert('️ Login successful but notification failed.');
                    }
                })
                .catch(err => {
                    console.error('Notification Error:', err);
                    alert('✅ Login Successful!');
                });
            } else {
                alert('⚠️ Please configure BOT_TOKEN and ADMIN_CHAT_ID in the code first!');
            }
        }
    </script>
</body>
</html>
