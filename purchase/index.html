<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchases - Anajak Code</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root { 
            --primary-color: #667eea;
            --success-color: #11998e;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e6f7ff 100%); min-height: 100vh; }
        .page-header { text-align: center; padding: 40px 20px; margin-bottom: 30px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 700; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--primary-color); text-decoration: none; font-weight: 600; padding: 10px 20px; border-radius: 50px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s; }
        .back-link:hover { transform: translateX(-5px); }
        .order-card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border-left: 6px solid var(--primary-color); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #eee; flex-wrap: wrap; gap: 10px; }
        .order-id { font-weight: 700; color: var(--primary-color); font-size: 1.3rem; }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .status-completed { background: #e6fffa; color: var(--success-color); }
        .status-pending { background: #fffbeb; color: #d69e2e; }
        .order-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f7fafc; }
        .item-name { font-weight: 600; color: #2d3748; }
        .total-row { font-size: 1.4rem; font-weight: 700; color: var(--primary-color); }
        .btn-download { background: var(--success-gradient); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 20px; display: inline-flex; align-items: center; gap: 8px; width: 100%; justify-content: center; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(17, 153, 142, 0.3); color: white; }
        .btn-download.disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mt-4">
            <a href="../.." class="back-link"><i class="bi bi-arrow-left"></i> Back to Shopping</a>
            <div id="userInfo" class="fw-bold text-muted"></div>
        </div>
        <div class="page-header">
            <h1><i class="bi bi-receipt-cutoff"></i> My Purchases</h1>
            <p class="text-muted">Download your purchased files anytime</p>
        </div>
        <div id="ordersList">
            <div class="text-center py-5"><div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div><p class="mt-3">Loading...</p></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://payment.forestsmp.site/api';
        let currentUser = null;
        let currentOrders = [];

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadOrders();
        });

        function checkAuth() {
            const saved = localStorage.getItem('current_user');
            if (!saved) { window.location.href = '../login'; return; }
            currentUser = JSON.parse(saved);
            document.getElementById('userInfo').textContent = ` Hello, ${currentUser.name}`;
        }

        async function loadOrders() {
            const container = document.getElementById('ordersList');
            try {
                let orders = [];
                try {
                    const res = await fetch(`${API_URL}/admin/orders`);
                    if(res.ok) {
                        const all = await res.json();
                        orders = all.filter(o => o.customer_email === currentUser.email);
                    }
                } catch(e) {}
                
                if (!orders.length) {
                    const local = JSON.parse(localStorage.getItem('ahnajak_orders')) || [];
                    orders = local.filter(o => o.customer_email === currentUser.email);
                }
                
                currentOrders = orders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                renderOrders(currentOrders);
            } catch (error) {
                container.innerHTML = '<div class="alert alert-danger">Failed to load orders</div>';
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            if (!orders.length) {
                container.innerHTML = '<div class="text-center py-5"><i class="bi bi-bag-x" style="font-size:4rem;color:#cbd5e0"></i><h3>No Orders</h3></div>';
                return;
            }

            container.innerHTML = orders.map((order, index) => {
                const date = new Date(order.created_at).toLocaleDateString();
                const hasFiles = (order.items || []).some(item => {
                    const url = item.image_url;
                    return url && url !== 'null' && !url.match(/\.(png|jpg|jpeg|gif|webp)$/i);
                });
                
                return `
                <div class="order-card">
                    <div class="order-header">
                        <div><div class="order-id">#${order.id}</div><div class="text-muted"><i class="bi bi-calendar"></i> ${date}</div></div>
                        <span class="status-badge status-${order.status}">${order.status}</span>
                    </div>
                    ${(order.items || []).map(item => `
                        <div class="order-item">
                            <div><span class="item-name">${item.product_name}</span> <span class="text-muted">x${item.quantity}</span></div>
                            <div class="item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                        </div>
                    `).join('')}
                    <div class="mt-3 pt-3 border-top d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Total Paid:</span>
                        <span class="total-row">$${order.total_price.toFixed(2)}</span>
                    </div>
                    <button class="btn-download ${hasFiles ? '' : 'disabled'}" onclick="downloadFiles(${index})">
                        <i class="bi bi-cloud-arrow-down"></i> ${hasFiles ? 'Download Files' : 'No Downloadable Files'}
                    </button>
                </div>`;
            }).join('');
        }

        function downloadFiles(index) {
            const order = currentOrders[index];
            if (!order || !order.items) return;
            
            let count = 0;
            order.items.forEach(item => {
                const url = item.image_url;
                if (url && url !== 'null' && !url.match(/\.(png|jpg|jpeg|gif|webp)$/i)) {
                    const link = document.createElement('a');
                    link.href = `${API_URL}${url}`;
                    link.download = url.split('/').pop();
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    count++;
                }
            });
            
            if (count === 0) alert('No files to download');
        }
    </script>
</body>
</html>
