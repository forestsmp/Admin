<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>

    <link rel="icon" type="image/png" sizes="48x48" href="https://i.ibb.co/20ZRpT38/web-search-1-1.webp">
    
    <link rel="icon" type="image/png" sizes="48x48" href="https://i.ibb.co/20ZRpT38/web-search-1-1.webp">
    
    <!-- ដាក់ហ្វុងខ្ែរ Kantumruy Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f5f5f5; /* ពណ៌ប្រផេះស្រាលសម្រាប់ផ្ទៃខាងក្រៅ */
            color: #333;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* ប្រអប់ពណ៌សមានស្រមោល */
        .container {
            max-width: 800px;
            width: 90%;
            padding: 3rem 2rem;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.8s ease-out;
        }

        /* រូបភាព 404 ពី link */
        .error-image {
            width: 100%;
            max-width: 500px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* អត្ថបទ Page not found - ពណ៌ #6A8 */
        .error-text {
            margin-top: 2rem;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Kantumruy Pro', sans-serif;
            color: #383838; /* ពណ៌បៃតង */
            letter-spacing: 2px;
        }

        /* Keyframe Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Responsive សម្រាប់ទូរសព្ទ */
        @media (max-width: 640px) {
            .container {
                padding: 2rem 1rem;
                width: 95%;
            }
            
            .error-text {
                font-size: 1.3rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- រូបភាពពី link -->
        <img src="https://i.ibb.co/zh1d2tzB/1784269432872.webp" 
             alt="404 Page Not Found" 
             class="error-image">
        
        <!-- អត្ថបទ Page not found ពណ៌ #6A8 -->
        <p class="error-text">Page not found</p>
    </div>

</body>
</html>
