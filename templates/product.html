{% extends "base.html" %}
{% block content %}
<div class="row">
  <div class="col-md-6">
    <img src="{{ product.image_url or 'https://via.placeholder.com/400' }}" class="img-fluid">
  </div>
  <div class="col-md-6">
    <h2>{{ product.name }}</h2>
    <p>{{ product.description }}</p>
    <h3 class="text-primary">${{ "%.2f"|format(product.price) }}</h3>
    <p>Stock: {{ product.stock }}</p>
    {% if current_user.is_authenticated and product.stock > 0 %}
    <form method="POST" action="{{ url_for('add_to_cart', product_id=product.id) }}" class="d-flex gap-2">
      <input type="number" name="quantity" value="1" min="1" class="form-control" style="width:100px">
      <button class="btn btn-success">Add to Cart</button>
    </form>
    {% endif %}
  </div>
</div>
{% endblock %}
