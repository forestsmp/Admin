{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<h2 class="mb-4">Products</h2>
<div class="row">
  {% for p in products %}
  <div class="col-md-3 mb-4">
    <div class="card h-100">
      <img src="{{ p.image_url or 'https://via.placeholder.com/300' }}" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">{{ p.name }}</h5>
        <p class="card-text">${{ "%.2f"|format(p.price) }}</p>
        <a href="{{ url_for('product_detail', id=p.id) }}" class="btn btn-primary btn-sm">View</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
