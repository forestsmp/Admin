{% extends "base.html" %}
{% block content %}
<h2>Manage Orders</h2>
<table class="table">
  <thead><tr><th>ID</th><th>User</th><th>Total</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
  <tbody>
  {% for o in orders %}
  <tr>
    <td>#{{ o.id }}</td><td>{{ o.user.username }}</td>
    <td>${{ "%.2f"|format(o.total) }}</td>
    <td>{{ o.status }}</td>
    <td>{{ o.created_at.strftime('%Y-%m-%d') }}</td>
    <td>
      <form method="POST" action="{{ url_for('admin_update_order', id=o.id) }}" class="d-flex gap-1">
        <select name="status" class="form-select form-select-sm">
          <option>Pending</option><option>Shipped</option><option>Delivered</option><option>Cancelled</option>
        </select>
        <button class="btn btn-sm btn-primary">Update</button>
      </form>
    </td>
  </tr>
  {% endfor %}
  </tbody>
</table>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">← Back</a>
{% endblock %}
